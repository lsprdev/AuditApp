services:
  db:
    image: mysql:8.0
    container_name: audit_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: audit_premium
      MYSQL_ROOT_PASSWORD: root_secure_password_2026
      MYSQL_USER: audit_user
      MYSQL_PASSWORD: audit_secure_password_2026
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-proot_secure_password_2026",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - audit_network

  backend:
    build:
      context: ./normas
      dockerfile: Dockerfile
    container_name: audit_backend
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py ensure_superuser && gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin
      DB_NAME: audit_premium
      DB_USER: audit_user
      DB_PASSWORD: audit_secure_password_2026
      DB_HOST: db
      DB_PORT: "3306"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,auditapp.lsx.li"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173,https://auditapp.lsx.li"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - audit_network

  frontend:
    build:
      context: ./audit-premium
      dockerfile: Dockerfile
    container_name: audit_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - audit_network

volumes:
  mysql_data:

networks:
  audit_network:
    driver: bridge
